<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0b0d">
<title>LifeOS</title>
<style>
:root{
  --bg:#0b0b0d;
  --card:#1c1c1e;
  --card2:#232326;
  --card3:#2c2c2f;
  --border:#ffffff14;
  --border-soft:#ffffff0d;
  --text:#f5f5f7;
  --text2:#98989d;
  --text3:#68686d;
  --accent:#0a84ff;
  --accent-dim:#0a84ff1f;
  --success:#30d158;
  --success-dim:#30d1581f;
  --warning:#ff9f0a;
  --warning-dim:#ff9f0a1f;
  --danger:#ff453a;
  --danger-dim:#ff453a1f;
  --radius-l:20px;
  --radius-m:14px;
  --radius-s:10px;
  --sp1:4px; --sp2:8px; --sp3:12px; --sp4:16px; --sp5:20px; --sp6:28px; --sp7:40px;
  --ease: cubic-bezier(.22,1,.36,1);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0; width:100%; height:100%; background:var(--bg); overscroll-behavior-y:none;}
body{-webkit-font-smoothing:antialiased;}
.lifeos-root{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",system-ui,sans-serif;
  background:radial-gradient(1100px 700px at 50% -8%, #1a1a1e 0%, var(--bg) 55%);
  color:var(--text);
  width:100%;
  min-height:100vh; min-height:100dvh;
  position:relative;
  overflow-x:hidden;
  letter-spacing:-0.01em;
}
.screen{
  width:100%;
  max-width:560px;
  margin:0 auto;
  padding:max(20px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) 118px max(20px, env(safe-area-inset-left));
  min-height:100vh; min-height:100dvh;
  animation:fadeIn .38s var(--ease);
}
@keyframes fadeIn{from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:translateY(0)}}
h1,h2,h3,p{margin:0;}
.section{margin-bottom:var(--sp5);}
.card{
  background:linear-gradient(180deg, var(--card3), var(--card));
  border:1px solid var(--border);
  border-radius:var(--radius-l);
  padding:var(--sp5);
  box-shadow:0 8px 24px -14px #000000a0, inset 0 1px 0 #ffffff08;
  transition:transform .2s var(--ease);
}
.card:active{transform:scale(.985);}
.eyebrow{font-size:12px; color:var(--text2); font-weight:700; letter-spacing:.04em; text-transform:uppercase; opacity:.8; margin-bottom:6px;}
.page-title{font-size:30px; font-weight:750; letter-spacing:-.02em; margin-bottom:var(--sp5); display:flex; align-items:center; justify-content:space-between;}
.icon-btn{
  width:38px; height:38px; border-radius:12px; display:flex; align-items:center; justify-content:center;
  background:var(--card2); border:1px solid var(--border); color:var(--text2); cursor:pointer; flex-shrink:0;
  transition:transform .15s var(--ease), color .15s;
}
.icon-btn:active{transform:scale(.9);}
.icon-btn.accent{color:var(--accent);}

.btn{
  background:var(--accent); color:#fff; border:none; border-radius:14px;
  padding:14px 18px; font-size:16px; font-weight:600; cursor:pointer; width:100%;
  transition:transform .15s var(--ease), opacity .15s;
  min-height:44px;
}
.btn:active{transform:scale(.97);}
.btn.secondary{background:var(--card2); color:var(--text); border:1px solid var(--border);}
.btn.danger{background:var(--danger-dim); color:var(--danger);}
.btn.small{width:auto; padding:10px 16px; font-size:14.5px; border-radius:12px;}
.row-flex{display:flex; gap:10px;}

/* ---------- Home hero ---------- */
.status-hero{
  text-align:center;
  padding:var(--sp6) var(--sp5);
}
.status-badge{
  display:inline-flex; align-items:center; gap:6px;
  font-size:13px; font-weight:800; letter-spacing:.08em;
  padding:7px 16px; border-radius:100px; margin-bottom:16px;
}
.status-badge.elite{background:var(--success-dim); color:var(--success);}
.status-badge.locked{background:var(--accent-dim); color:var(--accent);}
.status-badge.track{background:var(--warning-dim); color:var(--warning);}
.status-badge.needs{background:var(--danger-dim); color:var(--danger);}
.status-pct{font-size:52px; font-weight:750; letter-spacing:-.03em; line-height:1;}
.status-sub{font-size:14.5px; color:var(--text2); margin-top:6px; font-weight:500;}
.status-time{font-size:15px; color:var(--text3); margin-top:14px; font-weight:600; letter-spacing:.01em;}
.status-ring-bg{fill:none; stroke:#ffffff10; stroke-width:6;}
.status-ring-fg{fill:none; stroke:var(--accent); stroke-width:6; stroke-linecap:round; transition:stroke-dashoffset .8s var(--ease);}

.quote-card{display:flex; gap:12px; align-items:flex-start;}
.quote-card .qicon{color:var(--accent); flex-shrink:0; margin-top:2px;}
.quote-text{font-size:15.5px; line-height:1.5; font-style:italic; color:var(--text);}

.mission-card{display:flex; align-items:center; gap:14px;}
.mission-icon{
  width:46px; height:46px; border-radius:14px; background:var(--accent-dim); color:var(--accent);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.mission-name{font-size:18px; font-weight:700;}
.mission-time{font-size:13.5px; color:var(--text2); margin-top:2px; font-weight:600;}
.mission-empty{display:flex; align-items:center; gap:12px;}
.mission-empty .mission-icon{background:var(--success-dim); color:var(--success);}

.reminder-strip{display:flex; align-items:center; gap:10px; font-size:13.5px; color:var(--text2); padding:2px 4px;}
.reminder-strip .ricon{color:var(--text3); flex-shrink:0;}

.progress-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.pcard{
  background:var(--card2); border:1px solid var(--border-soft); border-radius:var(--radius-m);
  padding:14px; display:flex; flex-direction:column; gap:10px; cursor:pointer; min-height:88px;
  transition:transform .15s var(--ease), background .2s;
}
.pcard:active{transform:scale(.96);}
.pcard.done{background:var(--success-dim); border-color:#30d15830;}
.pcard.off{opacity:.45;}
.pcard-top{display:flex; align-items:center; justify-content:space-between;}
.pcard-icon{color:var(--text2);}
.pcard.done .pcard-icon{color:var(--success);}
.pcard-check{
  width:22px; height:22px; border-radius:50%; border:2px solid var(--text3);
  display:flex; align-items:center; justify-content:center; color:#fff; flex-shrink:0;
}
.pcard.done .pcard-check{background:var(--success); border-color:var(--success);}
.pcard-name{font-size:14px; font-weight:700;}
.pcard-status{font-size:11.5px; color:var(--text3); font-weight:600;}
.pcard.done .pcard-status{color:var(--success);}
.overall-bar{margin-top:14px;}
.overall-row{display:flex; justify-content:space-between; font-size:13px; color:var(--text2); font-weight:600; margin-bottom:8px;}
.overall-track{height:8px; border-radius:6px; background:#ffffff12; overflow:hidden;}
.overall-fill{height:100%; background:linear-gradient(90deg, var(--accent), var(--success)); transition:width .6s var(--ease);}

/* ---------- routine rows ---------- */
.info-row{display:flex; align-items:center; gap:14px; padding:13px 0; border-bottom:1px solid var(--border-soft);}
.info-row:last-child{border-bottom:none;}
.info-icon{width:34px; height:34px; border-radius:10px; background:var(--card2); color:var(--accent); display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.info-main{flex:1; min-width:0;}
.info-name{font-size:15.5px; font-weight:650;}
.info-sub{font-size:12.5px; color:var(--text2); margin-top:2px;}
.info-value{font-size:15px; color:var(--text2); font-weight:600; text-align:right;}
.sublist{margin:6px 0 2px 48px;}
.subrow{display:flex; justify-content:space-between; font-size:13.5px; color:var(--text2); padding:6px 0;}
.subrow b{color:var(--text); font-weight:600;}
.extra-row{display:flex; align-items:center; gap:14px; padding:12px 0; border-bottom:1px solid var(--border-soft);}
.extra-row:last-child{border-bottom:none;}

/* ---------- gym ---------- */
.gym-row{display:flex; align-items:center; gap:14px; padding:14px 0; border-bottom:1px solid var(--border-soft);}
.gym-row:last-child{border-bottom:none;}
.gym-day{width:64px; font-size:13px; color:var(--text2); font-weight:700; text-transform:uppercase; letter-spacing:.02em;}
.gym-muscle{flex:1; font-size:16.5px; font-weight:700;}
.gym-muscle.rest{color:var(--text3); font-weight:600;}
.gym-today-tag{background:var(--accent); color:#fff; font-size:10.5px; font-weight:800; padding:3px 9px; border-radius:100px;}

/* ---------- calendar ---------- */
.cal-nav{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;}
.cal-month-label{font-size:19px; font-weight:750;}
.cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:4px;}
.cal-dow{font-size:10.5px; color:var(--text3); text-align:center; font-weight:700; padding-bottom:8px;}
.cal-cell{
  aspect-ratio:1; border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:4px; font-size:13px; color:var(--text2); background:transparent; cursor:pointer; position:relative;
}
.cal-cell.today{background:var(--accent-dim);}
.cal-cell.today .cal-num{color:var(--accent); font-weight:800;}
.cal-cell.future{opacity:.32; cursor:default;}
.cal-cell.empty{cursor:default;}
.cal-num{font-size:13.5px; font-weight:600;}
.cal-dot{width:5px; height:5px; border-radius:50%; background:var(--text3);}
.cal-dot.green{background:var(--success);}
.cal-legend{display:flex; gap:18px; margin-top:18px; font-size:12.5px; color:var(--text2);}
.cal-legend span{display:inline-flex; align-items:center; gap:6px;}
.cal-legend .dot{width:7px; height:7px; border-radius:50%;}

/* ---------- reminders ---------- */
.reminder-row{display:flex; align-items:center; gap:12px; padding:13px 0; border-bottom:1px solid var(--border-soft);}
.reminder-row:last-child{border-bottom:none;}
.pr-dot{width:8px; height:8px; border-radius:50%; flex-shrink:0;}
.pr-dot.high{background:var(--danger);}
.pr-dot.medium{background:var(--warning);}
.pr-dot.low{background:var(--text3);}
.reminder-text{flex:1; font-size:15px; font-weight:600;}
.reminder-text.done{color:var(--text3); text-decoration:line-through;}
.reminder-due{font-size:12px; color:var(--text2); margin-top:2px;}
.check-circle{
  width:26px; height:26px; min-width:26px; border-radius:50%; border:2px solid var(--text3);
  display:flex; align-items:center; justify-content:center; cursor:pointer; color:#fff;
  transition:all .2s var(--ease); background:transparent; flex-shrink:0;
}
.check-circle.done{background:var(--success); border-color:var(--success); animation:pop .3s var(--ease);}
@keyframes pop{0%{transform:scale(.7)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
.del-x{color:var(--text3); cursor:pointer; padding:4px; flex-shrink:0;}

/* ---------- jerk meter ---------- */
.streak-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.streak-box{background:var(--card2); border:1px solid var(--border-soft); border-radius:var(--radius-m); padding:16px; text-align:center;}
.streak-num{font-size:34px; font-weight:800; color:var(--warning);}
.streak-label{font-size:12px; color:var(--text2); font-weight:700; text-transform:uppercase; letter-spacing:.03em; margin-top:4px;}

/* ---------- goals ---------- */
.goal-type-tabs{display:flex; gap:8px; overflow-x:auto; margin-bottom:16px; padding-bottom:2px;}
.goal-type-tabs::-webkit-scrollbar{display:none;}
.pill{
  display:inline-flex; align-items:center; gap:6px; white-space:nowrap;
  background:var(--card2); border:1px solid var(--border); color:var(--text2);
  font-size:13px; font-weight:650; padding:8px 14px; border-radius:100px; cursor:pointer;
}
.pill.active{background:var(--accent-dim); color:var(--accent); border-color:transparent;}
.goal-card{margin-bottom:12px; cursor:pointer;}
.goal-title{font-size:16.5px; font-weight:700;}
.goal-title.completed{color:var(--text3); text-decoration:line-through;}
.goal-why{font-size:13px; color:var(--text2); margin-top:4px; font-style:italic;}
.progress-bar{height:7px; border-radius:6px; background:#ffffff12; overflow:hidden; margin-top:12px;}
.progress-fill{height:100%; background:var(--accent); transition:width .6s var(--ease);}
.goal-meta-row{display:flex; justify-content:space-between; margin-top:9px; font-size:12px; color:var(--text2); font-weight:600;}
.milestone{display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border-soft); font-size:14.5px;}
.milestone:last-child{border-bottom:none;}
.mini-check{width:20px; height:20px; border-radius:6px; border:2px solid var(--text3); display:flex; align-items:center; justify-content:center; color:#fff; cursor:pointer; flex-shrink:0;}
.mini-check.done{background:var(--success); border-color:var(--success);}

/* ---------- recipes ---------- */
.recipe-card{margin-bottom:12px; cursor:pointer;}
.recipe-title{font-size:16.5px; font-weight:700;}
.recipe-sub{font-size:13px; color:var(--text2); margin-top:4px;}

/* ---------- settings ---------- */
.settings-section-title{font-size:13px; color:var(--text2); font-weight:700; text-transform:uppercase; letter-spacing:.04em; margin:0 4px 10px 4px;}
.settings-row{display:flex; justify-content:space-between; align-items:center; padding:14px 0; border-bottom:1px solid var(--border-soft); cursor:pointer; gap:12px;}
.settings-row:last-child{border-bottom:none;}
.settings-row .label{font-size:15.5px; font-weight:550;}
.settings-row .sub{font-size:12.5px; color:var(--text2); margin-top:2px; font-weight:400;}
.chev{color:var(--text3); flex-shrink:0;}
.toggle{width:46px; height:28px; border-radius:20px; background:var(--card2); border:1px solid var(--border); position:relative; cursor:pointer; transition:background .2s; flex-shrink:0;}
.toggle.on{background:var(--success);}
.toggle::after{content:''; position:absolute; width:22px; height:22px; border-radius:50%; background:#fff; top:2px; left:2px; transition:transform .2s var(--ease);}
.toggle.on::after{transform:translateX(18px);}
.swatch-row{display:flex; gap:12px; padding:8px 0;}
.swatch{width:34px; height:34px; border-radius:50%; cursor:pointer; border:2px solid transparent; display:flex; align-items:center; justify-content:center; color:#fff;}
.swatch.sel{border-color:var(--text);}
.about-block{text-align:center; padding:8px 0;}
.about-block .an{font-size:20px; font-weight:800;}
.about-block .av{font-size:13px; color:var(--text2); margin-top:4px;}

/* ---------- quick links ---------- */
.quick-launch{display:flex; gap:14px; overflow-x:auto; padding-bottom:4px;}
.quick-launch::-webkit-scrollbar{display:none;}
.ql-item{display:flex; flex-direction:column; align-items:center; gap:8px; min-width:60px; cursor:pointer;}
.ql-icon{width:52px; height:52px; border-radius:16px; background:var(--card2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:22px; transition:transform .15s var(--ease);}
.ql-item:active .ql-icon{transform:scale(.92);}
.ql-label{font-size:11px; color:var(--text2); font-weight:650; max-width:60px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

/* ---------- tabbar ---------- */
.tabbar{
  position:fixed; bottom:0; left:0; right:0; width:100%;
  background:#141416ee; backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  display:flex; z-index:50;
  padding:8px max(4px, env(safe-area-inset-right)) max(8px, env(safe-area-inset-bottom)) max(4px, env(safe-area-inset-left));
}
.tab{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; min-height:44px; justify-content:center;
  color:var(--text3); cursor:pointer; font-size:10px; font-weight:650; padding:4px 0; border-radius:12px;
  transition:color .2s var(--ease), transform .15s var(--ease);
}
.tab:active{transform:scale(.92);}
.tab.active{color:var(--accent);}

/* ---------- fab ---------- */
.fab{
  position:fixed; bottom:calc(96px + env(safe-area-inset-bottom)); right:max(20px, env(safe-area-inset-right));
  width:52px; height:52px; border-radius:50%; background:var(--accent); color:#fff;
  display:flex; align-items:center; justify-content:center; box-shadow:0 8px 22px -6px #0a84ff90;
  cursor:pointer; z-index:40; border:none; transition:transform .15s var(--ease);
}
.fab:active{transform:scale(.9);}

/* ---------- modal ---------- */
.modal-backdrop{
  position:fixed; inset:0; background:#000000b0; backdrop-filter:blur(3px);
  z-index:100; display:flex; align-items:flex-end; animation:fadeIn .2s var(--ease);
}
.modal-sheet{
  width:100%; margin:0 auto; max-width:560px;
  background:#1a1a1c; border-radius:26px 26px 0 0;
  padding:14px max(20px, env(safe-area-inset-right)) calc(30px + env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
  max-height:86vh; overflow-y:auto;
  animation:slideUp .32s var(--ease);
  border:1px solid var(--border); border-bottom:none;
  position:relative;
}
@keyframes slideUp{from{transform:translateY(50px); opacity:.3} to{transform:translateY(0); opacity:1}}
.modal-handle{width:36px; height:4px; background:var(--text3); border-radius:4px; margin:0 auto 16px auto; opacity:.5;}
.modal-title{font-size:20px; font-weight:750; margin-bottom:14px; padding-right:30px;}
.close-x{position:absolute; top:14px; right:16px; color:var(--text2); cursor:pointer; z-index:5; width:30px; height:30px; display:flex; align-items:center; justify-content:center;}

.field{margin-bottom:15px;}
.field label{display:block; font-size:12.5px; color:var(--text2); font-weight:650; margin-bottom:6px; text-transform:uppercase; letter-spacing:.02em;}
.field input[type=text], .field input[type=date], .field input[type=time], .field input[type=number], .field textarea, .field select{
  width:100%; background:var(--card2); border:1px solid var(--border); color:var(--text);
  padding:12px 14px; border-radius:12px; font-size:15px; font-family:inherit;
}
.field textarea{resize:vertical; min-height:80px; line-height:1.5;}
.day-select{display:flex; gap:6px; flex-wrap:wrap;}
.day-chip{width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:var(--card2); border:1px solid var(--border); font-size:12.5px; font-weight:700; color:var(--text2); cursor:pointer;}
.day-chip.sel{background:var(--accent); color:#fff; border-color:transparent;}

.more-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:4px;}
.more-item{display:flex; flex-direction:column; align-items:center; gap:10px; padding:18px 6px; background:var(--card2); border:1px solid var(--border-soft); border-radius:var(--radius-m); cursor:pointer;}
.more-item:active{transform:scale(.95);}
.more-item .mi-icon{width:44px; height:44px; border-radius:13px; background:var(--accent-dim); color:var(--accent); display:flex; align-items:center; justify-content:center;}
.more-item .mi-label{font-size:12.5px; font-weight:650; text-align:center;}

.empty-state{text-align:center; padding:36px 10px;}
.empty-state .big-icon{color:var(--text3); margin-bottom:14px; display:flex; justify-content:center;}
.empty-state h3{font-size:18px; margin-bottom:6px; font-weight:700;}
.empty-state p{color:var(--text2); font-size:14px;}
.day-summary-row{display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--border-soft);}
.day-summary-row:last-child{border-bottom:none;}

/* ---------- mission control / dashboard ---------- */
.greeting-row{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:var(--sp4);}
.greeting-hi{font-size:26px; font-weight:750; letter-spacing:-.02em;}
.greeting-date{font-size:13.5px; color:var(--text2); margin-top:3px; font-weight:600;}
.score-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px;}
.score-box{background:var(--card2); border:1px solid var(--border-soft); border-radius:var(--radius-m); padding:14px; text-align:center;}
.score-num{font-size:26px; font-weight:800;}
.score-label{font-size:11px; color:var(--text2); font-weight:700; text-transform:uppercase; letter-spacing:.03em; margin-top:4px;}
.grade-pill{display:inline-block; font-size:13px; font-weight:800; padding:2px 10px; border-radius:100px; background:var(--accent-dim); color:var(--accent); margin-top:2px;}
.countdown-row{display:flex; align-items:center; gap:12px;}
.insight-row{display:flex; align-items:flex-start; gap:11px; padding:11px 0; border-bottom:1px solid var(--border-soft); font-size:14px; line-height:1.4;}
.insight-row:last-child{border-bottom:none;}
.insight-row .iicon{color:var(--accent); flex-shrink:0; margin-top:1px;}

/* ---------- stat rows / summary cards (shared: fitness/nutrition/money/shopify) ---------- */
.stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.stat-box{background:var(--card2); border:1px solid var(--border-soft); border-radius:var(--radius-m); padding:15px;}
.stat-box .sv{font-size:22px; font-weight:800;}
.stat-box .sl{font-size:11.5px; color:var(--text2); font-weight:700; text-transform:uppercase; letter-spacing:.03em; margin-top:5px;}
.stat-box .ss{font-size:11.5px; color:var(--text3); margin-top:2px;}
.mini-tabs{display:flex; gap:8px; margin-bottom:14px; overflow-x:auto;}
.mini-tabs::-webkit-scrollbar{display:none;}
.log-row{display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border-soft); font-size:14.5px;}
.log-row:last-child{border-bottom:none;}
.log-row .lr-main{font-weight:650;}
.log-row .lr-sub{font-size:12px; color:var(--text2); margin-top:2px;}
.log-row .lr-val{font-weight:700; text-align:right;}
.log-row .lr-val.pos{color:var(--success);}
.log-row .lr-val.neg{color:var(--danger);}

/* ---------- line graph ---------- */
.graph-wrap{margin-top:6px;}
.graph-empty{text-align:center; color:var(--text3); font-size:13px; padding:24px 0;}

/* ---------- measurement grid ---------- */
.measure-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;}
.measure-box{background:var(--card2); border-radius:var(--radius-m); padding:12px; text-align:center;}
.measure-box .mv{font-size:18px; font-weight:750;}
.measure-box .ml{font-size:11px; color:var(--text2); font-weight:650; margin-top:3px;}

/* ---------- photo grid ---------- */
.photo-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:10px;}
.photo-item{position:relative; border-radius:var(--radius-s); overflow:hidden; aspect-ratio:3/4; background:var(--card2);}
.photo-item img{width:100%; height:100%; object-fit:cover; display:block;}
.photo-item .pd{position:absolute; bottom:4px; left:4px; right:4px; font-size:9.5px; color:#fff; background:#00000090; padding:2px 5px; border-radius:6px; text-align:center;}

/* ---------- school timetable ---------- */
.tt-row{display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border-soft);}
.tt-row:last-child{border-bottom:none;}
.tt-time{width:56px; font-size:12.5px; color:var(--text2); font-weight:700;}
.tt-dot{width:10px; height:10px; border-radius:3px; flex-shrink:0;}
.tt-main{flex:1;}
.tt-name{font-size:15px; font-weight:650;}
.tt-room{font-size:12px; color:var(--text2); margin-top:1px;}
.day-strip{display:flex; gap:6px; overflow-x:auto; margin-bottom:14px;}
.day-strip::-webkit-scrollbar{display:none;}
.day-pill{padding:8px 14px; border-radius:100px; background:var(--card2); border:1px solid var(--border); color:var(--text2); font-size:12.5px; font-weight:700; white-space:nowrap; cursor:pointer;}
.day-pill.active{background:var(--accent-dim); color:var(--accent); border-color:transparent;}

/* ---------- travel ---------- */
.chip-row{display:flex; flex-wrap:wrap; gap:8px; margin-top:8px;}
.chip{background:var(--card2); border:1px solid var(--border-soft); color:var(--text); font-size:13px; font-weight:600; padding:7px 12px; border-radius:100px; display:flex; align-items:center; gap:6px;}
.chip .cx{color:var(--text3); cursor:pointer; display:flex;}
.trip-card{margin-bottom:12px;}
.trip-title{font-size:16px; font-weight:700;}
.trip-dates{font-size:12.5px; color:var(--text2); margin-top:3px; font-weight:600;}

/* ---------- dream board ---------- */
.board-tabs{display:flex; gap:8px; overflow-x:auto; margin-bottom:14px;}
.board-tabs::-webkit-scrollbar{display:none;}
.board-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.board-item{position:relative; border-radius:var(--radius-m); overflow:hidden; aspect-ratio:1; background:var(--card2); border:1px solid var(--border-soft);}
.board-item img{width:100%; height:100%; object-fit:cover; display:block;}
.board-item .bd{position:absolute; bottom:0; left:0; right:0; font-size:11px; color:#fff; background:linear-gradient(0deg,#000000c0,transparent); padding:14px 8px 6px; }
.board-item .bx{position:absolute; top:6px; right:6px; width:24px; height:24px; border-radius:50%; background:#000000a0; color:#fff; display:flex; align-items:center; justify-content:center;}
.board-quote{background:var(--card2); border:1px solid var(--border-soft); border-radius:var(--radius-m); padding:14px; font-style:italic; font-size:14px; margin-bottom:10px; position:relative;}

/* ---------- timeline ---------- */
.tl-item{display:flex; gap:14px; position:relative; padding-bottom:22px;}
.tl-item:last-child{padding-bottom:0;}
.tl-dot-col{display:flex; flex-direction:column; align-items:center;}
.tl-dot{width:12px; height:12px; border-radius:50%; background:var(--accent); flex-shrink:0; margin-top:4px;}
.tl-line{flex:1; width:2px; background:var(--border); margin-top:4px;}
.tl-item:last-child .tl-line{display:none;}
.tl-body{flex:1; padding-bottom:2px;}
.tl-date{font-size:11.5px; color:var(--text3); font-weight:700; text-transform:uppercase; letter-spacing:.02em;}
.tl-title{font-size:15.5px; font-weight:700; margin-top:2px;}
.tl-note{font-size:13px; color:var(--text2); margin-top:2px;}

/* ---------- monthly review ---------- */
.review-hero{text-align:center; padding:var(--sp5) 0;}
.review-grade{font-size:44px; font-weight:800;}
.review-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:16px;}

function fmtMinutes(mins){ const h=Math.floor(mins/60), m=mins%60; if(h&&m) return h+' hour'+(h>1?'s':'')+' '+m+' minutes'; if(h) return h+' hour'+(h>1?'s':''); return m+' minutes'; }

/* ================= DAY TASK ENGINE ================= */
function getDayTasks(dateObj){
  const dow = dateObj.getDay();
  const r = DB.routine;
  const muscle = DB.gymSchedule[dow];
  const isRest = muscle==='Rest';
  const list = [
    {key:'morning', name:'Morning Routine', icon:'sun', timeStr:r.wakeUp, sortMin:timeToMin(r.wakeUp), applicable:true},
    {key:'gym', name: isRest?'Rest Day':muscle, icon:'gym', timeStr:r.gym, sortMin:timeToMin(r.gym), applicable:true, auto:isRest},
    {key:'school', name:'School', icon:'book', timeStr:r.school, sortMin:timeToMin(r.school), applicable:(dow>=1&&dow<=5)},
    {key:'homework', name:'Homework', icon:'book', timeStr:null, sortMin:16*60, applicable:(dow===r.homeworkDay)},
    {key:'ecommerce', name:'Ecommerce', icon:'target', timeStr:null, sortMin:16*60+15, applicable:true},
    {key:'mealPrep', name:'Meal Prep', icon:'book', timeStr:null, sortMin:19*60, applicable:true},
    {key:'water', name:'Water', icon:'droplet', timeStr:null, sortMin:20*60, applicable:true, isCounter:true},
    {key:'jerk', name:'Jerk Meter', icon:'flame', timeStr:null, sortMin:22*60, applicable:true}
  ];
  return list.filter(t=>t.applicable).sort((a,b)=>a.sortMin-b.sortMin);
}
function isTaskDone(dateStr,key){
  const c = DB.completions[dateStr]||{};
  if(key==='water') return (c.water||0) >= DB.waterGoal;
  if(key==='gym'){ const dow=new Date(dateStr+'T00:00:00').getDay(); if(DB.gymSchedule[dow]==='Rest') return true; return !!c.gym; }
  return !!c[key];
}
function toggleTask(dateStr,key){
  if(!DB.completions[dateStr]) DB.completions[dateStr]={};
  const c = DB.completions[dateStr];
  if(key==='water'){
    c.water = ((c.water||0) + 1);
    if(c.water > DB.waterGoal) c.water = 0;
  } else if(key==='gym'){
    const dow = new Date(dateStr+'T00:00:00').getDay();
    if(DB.gymSchedule[dow]==='Rest') return;
    c.gym = !c.gym;
  } else {
    c[key] = !c[key];
    if(key==='jerk'){
      if(!DB.jerkMeter.history) DB.jerkMeter.history={};
      if(c.jerk) DB.jerkMeter.history[dateStr]='success';
      else delete DB.jerkMeter.history[dateStr];
    }
  }
  persistDebounced();
  render();
}
function dayCompletionPct(dateObj){
  const dateStr = todayStr(dateObj);
  const tasks = getDayTasks(dateObj);
  if(!tasks.length) return 100;
  const done = tasks.filter(t=>isTaskDone(dateStr,t.key)).length;
  return Math.round(done/tasks.length*100);
}
function statusLabel(pct){
  if(pct>=95) return {text:'ELITE DAY', cls:'elite'};
  if(pct>=70) return {text:'LOCKED IN', cls:'locked'};
  if(pct>=40) return {text:'ON TRACK', cls:'track'};
  return {text:'NEEDS WORK', cls:'needs'};
}

/* ================= MISSION CONTROL HELPERS ================= */
function greeting(now){
  const h = now.getHours();
  if(h<12) return 'Good Morning';
  if(h<18) return 'Good Afternoon';
  return 'Good Evening';
}
function computeLifeScore(){
  const now=new Date();
  let total=0, count=0;
  for(let i=0;i<7;i++){
    const d=addDays(now,-i);
    total += dayCompletionPct(d); count++;
  }
  return Math.round(total/count);
}
function gradeFor(score){
  if(score>=95) return 'A+';
  if(score>=88) return 'A';
  if(score>=75) return 'B';
  if(score>=60) return 'C';
  return 'D';
}
function computeWeekCompletion(weekStartDate){
  const now=new Date();
  let total=0, count=0;
  for(let i=0;i<7;i++){
    const d=addDays(weekStartDate,i);
    if(d>now) continue;
    total += dayCompletionPct(d); count++;
  }
  return count? Math.round(total/count) : 0;
}
function computeWeeklyStreak(){
  let streak=0;
  let wk = addDays(startOfWeek(new Date()),-7);
  while(true){
    const pct = computeWeekCompletion(wk);
    if(pct>=70){ streak++; wk=addDays(wk,-7); } else break;
    if(streak>104) break;
  }
  return streak;
}
function nextTaskCountdown(){
  const now=new Date();
  const dateStr=todayStr(now);
  const tasks = getDayTasks(now).filter(t=>t.timeStr && !t.auto && !isTaskDone(dateStr,t.key));
  const nowMin = now.getHours()*60+now.getMinutes();
  const upcoming = tasks.filter(t=>t.sortMin>=nowMin).sort((a,b)=>a.sortMin-b.sortMin)[0];
  if(!upcoming) return null;
  const mins = upcoming.sortMin-nowMin;
  return {task:upcoming, mins};
}
function generateInsights(){
  const insights=[];
  const now=new Date();
  const thisWeekStart = startOfWeek(now);
  const lastWeekStart = addDays(thisWeekStart,-7);
  const thisWeekPct = computeWeekCompletion(thisWeekStart);
  const lastWeekPct = computeWeekCompletion(lastWeekStart);
  if(thisWeekPct>lastWeekPct+3) insights.push('You are ahead of last week — '+thisWeekPct+'% vs '+lastWeekPct+'% completion.');
  else if(lastWeekPct>thisWeekPct+3) insights.push('You were stronger last week (' +lastWeekPct+'%) than this week so far ('+thisWeekPct+'%).');

  const dateStr = todayStr(now);
  const remaining = getDayTasks(now).filter(t=>!t.auto && !isTaskDone(dateStr,t.key)).length;
  if(remaining===1) insights.push('Only one task remaining today. Finish strong.');
  else if(remaining===0) insights.push('Every task is done today. That is a perfect day.');

  const {current:jerkCur} = computeJerkStreaks();
  if(jerkCur>=3) insights.push('Jerk Meter streak: '+jerkCur+' days.');

  // gym streak
  let gymStreak=0, gd=new Date();
  if(!isTaskDone(todayStr(gd),'gym')) gd=addDays(gd,-1);
  while(true){ const ds=todayStr(gd); const dow=gd.getDay(); if(DB.gymSchedule[dow]==='Rest'){ gd=addDays(gd,-1); continue; } if(isTaskDone(ds,'gym')){ gymStreak++; gd=addDays(gd,-1); } else break; }
  if(gymStreak>=3) insights.push('Gym streak: '+gymStreak+' day'+(gymStreak===1?'':'s')+'.');

  // calorie/protein hit streak this week
  let calHitDays=0, proteinMissDays=0, checked=0;
  for(let i=0;i<7;i++){
    const d=addDays(now,-i); if(d>now) continue;
    const ds=todayStr(d); const log=DB.nutrition.log[ds];
    if(!log) continue;
    checked++;
    if(log.calories && log.calories>=DB.nutrition.calorieGoal*0.9) calHitDays++;
    if(log.protein!=null && log.protein<DB.nutrition.proteinGoal) proteinMissDays++;
  }
  if(calHitDays>=3) insights.push('Calories have been on target '+calHitDays+' day'+(calHitDays===1?'':'s')+' this week.');
  if(proteinMissDays>=3) insights.push('You missed your protein goal '+proteinMissDays+' day'+(proteinMissDays===1?'':'s')+' this week.');

  // weight trend
  const wh = DB.fitness.weightHistory.slice().sort((a,b)=>a.date.localeCompare(b.date));
  if(wh.length>=2){
    const last = wh[wh.length-1], prev = wh[wh.length-2];
    const diff = (last.weight-prev.weight).toFixed(1);
    if(Math.abs(diff)>=0.1) insights.push('Weight '+(diff>0?'up':'down')+' '+Math.abs(diff)+'kg since your last log.');
  }
  const nextWeighIn = addDays(startOfWeek(now),6);
  if(now<=nextWeighIn) insights.push('Weigh-in due this Sunday.');

  // best day this month
  const y=now.getFullYear(), m=now.getMonth();
  let bestPct=-1, bestDay=null;
  for(let day=1; day<=now.getDate(); day++){
    const d=new Date(y,m,day); const pct=dayCompletionPct(d);
    if(pct>bestPct){ bestPct=pct; bestDay=day; }
  }
  if(bestDay===now.getDate() && bestPct>=70) insights.push('Today is your best day this month so far.');

  // habit completion overall this week
  insights.push('You have completed '+thisWeekPct+'% of your habits this week.');

  return insights.slice(0,5);
}
function monthKey(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function fmtMoney(n){ n=Number(n)||0; const neg=n<0; n=Math.abs(n); return (neg?'-':'')+'$'+n.toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:2}); }

/* simple SVG line/bar graph generator, returns svg markup string */
function svgLineGraph(points, opts){
  opts=opts||{};
  const w=opts.w||300, h=opts.h||130, pad=18;
  if(!points.length) return '';
  const vals = points.map(p=>p.v);
  let min=Math.min.apply(null,vals), max=Math.max.apply(null,vals);
  if(min===max){ min-=1; max+=1; }
  const stepX = points.length>1 ? (w-pad*2)/(points.length-1) : 0;
  const coords = points.map((p,i)=>{
    const x = pad + i*stepX;
    const y = h-pad - ((p.v-min)/(max-min))*(h-pad*2);
    return [x,y];
  });
  const path = coords.map((c,i)=> (i===0?'M':'L')+c[0].toFixed(1)+','+c[1].toFixed(1)).join(' ');
  const areaPath = path+' L'+coords[coords.length-1][0].toFixed(1)+','+(h-pad)+' L'+coords[0][0].toFixed(1)+','+(h-pad)+' Z';
  const dots = coords.map(c=>'<circle cx="'+c[0].toFixed(1)+'" cy="'+c[1].toFixed(1)+'" r="3" fill="var(--accent)"/>').join('');
  return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" preserveAspectRatio="none" style="overflow:visible;">'+
    '<path d="'+areaPath+'" fill="var(--accent)" opacity="0.12" stroke="none"/>'+
    '<path d="'+path+'" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>'+
    dots+'</svg>';
}

    if(!applicable) statusText = o.key==='school'?'No school':(o.key==='homework'?'Not due':'Off today');
    else if(o.key==='water') statusText = (DB.completions[dateStr]&&DB.completions[dateStr].water||0)+' / '+DB.waterGoal;
    else if(t.auto) statusText = 'Rest day';
    else statusText = done? 'Done' : 'Not yet';
    card.innerHTML =
      '<div class="pcard-top"><div class="pcard-icon">'+ICON(o.icon,18)+'</div>'+
      '<div class="pcard-check">'+(done?ICON('check',13):'')+'</div></div>'+
      '<div><div class="pcard-name">'+o.label+'</div><div class="pcard-status">'+statusText+'</div></div>';
    if(applicable && !t.auto){
      card.onclick=()=> toggleTask(dateStr, o.key);
    }
    grid.appendChild(card);
  });
  progWrap.appendChild(grid);
  const overall = document.createElement('div');
  overall.className='overall-bar';
  overall.innerHTML = '<div class="overall-row"><span>Overall Completion</span><span>'+pct+'%</span></div>'+
    '<div class="overall-track"><div class="overall-fill" style="width:'+pct+'%"></div></div>';
  progWrap.appendChild(overall);
  el.appendChild(progWrap);

  if(DB.settings.quickLinks && DB.settings.quickLinks.length){
    const ql = document.createElement('div');
    ql.className='card section';
    ql.innerHTML = '<div class="eyebrow">Quick Links</div>';
    const row = document.createElement('div'); row.className='quick-launch';
    DB.settings.quickLinks.forEach(l=>{
      const it=document.createElement('div'); it.className='ql-item';
      it.innerHTML = '<div class="ql-icon">'+l.icon+'</div><div class="ql-label">'+escapeHtml(l.name)+'</div>';
      it.onclick=()=> window.open(l.url,'_blank');

}

function fitnessSummaryStreak(){
  let s=0, d=new Date();
  if(!isTaskDone(todayStr(d),'gym')) d=addDays(d,-1);
  while(true){ const ds=todayStr(d); const dow=d.getDay(); if(DB.gymSchedule[dow]==='Rest'){ d=addDays(d,-1); continue; } if(isTaskDone(ds,'gym')){ s++; d=addDays(d,-1); } else break; }
  return s;
}

function renderCalendarPage(el){
  const title=document.createElement('div'); title.className='page-title';
  title.innerHTML='<span>Calendar</span>';
  el.appendChild(title);

  const card=document.createElement('div'); card.className='card section';
  const y=CAL_DATE.getFullYear(), m=CAL_DATE.getMonth();
  const nav=document.createElement('div'); nav.className='cal-nav';
  nav.innerHTML =
    '<div class="icon-btn" id="cal-prev">'+ICON('chevL',18)+'</div>'+
    '<div class="cal-month-label">'+MONTHS[m]+' '+y+'</div>'+
    '<div class="icon-btn" id="cal-next">'+ICON('chevR',18)+'</div>';
  card.appendChild(nav);

  const grid=document.createElement('div'); grid.className='cal-grid';
  DOW_SHORT.forEach(d=> grid.innerHTML += '<div class="cal-dow">'+d[0]+'</div>');
  const firstDay = new Date(y,m,1).getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const today = new Date();
  for(let i=0;i<firstDay;i++){ const c=document.createElement('div'); c.className='cal-cell empty'; grid.appendChild(c); }
  for(let day=1; day<=daysInMonth; day++){
    const d = new Date(y,m,day);
    const isFuture = d > new Date(today.getFullYear(),today.getMonth(),today.getDate());
    const isToday = todayStr(d)===todayStr(today);
    const cell = document.createElement('div');
    cell.className='cal-cell'+(isFuture?' future':'')+(isToday?' today':'');
    let dot='';
    if(!isFuture){
      const pct = dayCompletionPct(d);
      dot = '<div class="cal-dot'+(pct>=100?' green':'')+'"></div>';
    }
    cell.innerHTML = '<div class="cal-num">'+day+'</div>'+dot;
    if(!isFuture){ cell.onclick=()=> openModal('day-summary',{dateStr:todayStr(d)}); }
    grid.appendChild(cell);
  }

/* ================= JERK METER ================= */
function computeJerkStreaks(){
  const hist = DB.jerkMeter.history||{};
  let current=0;
  let d=new Date();
  const todayKey = todayStr(new Date());
  if(hist[todayKey]!=='success') d = addDays(d,-1);
  while(true){
    const ds = todayStr(d);
    if(hist[ds]==='success'){ current++; d=addDays(d,-1); } else break;
  }
  const dates = Object.keys(hist).filter(k=>hist[k]==='success').sort();
  let longest=0, run=0, prev=null;
  dates.forEach(ds=>{
    if(prev){
      const diff = Math.round((new Date(ds+'T00:00:00') - new Date(prev+'T00:00:00'))/86400000);
      run = diff===1? run+1 : 1;
    } else run=1;
    longest = Math.max(longest,run);
    prev=ds;
  });
  longest = Math.max(longest,current);
  return {current,longest};
}
function renderJerk(el){
  const title=document.createElement('div'); title.className='page-title';
  title.innerHTML='<span>Jerk Meter</span>';
  el.appendChild(title);

  const {current,longest} = computeJerkStreaks();
  const streaks=document.createElement('div'); streaks.className='card section';
  streaks.innerHTML='<div class="streak-grid">'+
    '<div class="streak-box"><div class="streak-num">'+current+'</div><div class="streak-label">Current Streak</div></div>'+
    '<div class="streak-box"><div class="streak-num">'+longest+'</div><div class="streak-label">Longest Streak</div></div>'+
  '</div>';
  el.appendChild(streaks);

  const dateStr = todayStr(new Date());
  const isSuccess = (DB.jerkMeter.history||{})[dateStr]==='success';
  const todayCard=document.createElement('div'); todayCard.className='card section mission-card';
  todayCard.style.cursor='pointer';
  todayCard.innerHTML = '<div class="mission-icon" style="'+(isSuccess?'background:var(--success-dim);color:var(--success);':'')+'">'+ICON('flame',22)+'</div>'+
    '<div><div class="mission-name">'+(isSuccess?'Marked as a win today':'Mark today as a win')+'</div><div class="mission-time">Tap to '+(isSuccess?'undo':'log success')+'</div></div>';
  todayCard.onclick=()=>{
    if(!DB.jerkMeter.history) DB.jerkMeter.history={};
    if(isSuccess) delete DB.jerkMeter.history[dateStr]; else DB.jerkMeter.history[dateStr]='success';
    persistDebounced(); render();
  };
  el.appendChild(todayCard);

  const histCard=document.createElement('div'); histCard.className='card section';
  histCard.innerHTML='<div class="eyebrow">History</div>';
  const grid=document.createElement('div'); grid.className='cal-grid';
  const now=new Date(); const y=now.getFullYear(), m=now.getMonth();
  DOW_SHORT.forEach(d=> grid.innerHTML += '<div class="cal-dow">'+d[0]+'</div>');
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  for(let i=0;i<firstDay;i++){ const c=document.createElement('div'); c.className='cal-cell empty'; grid.appendChild(c); }
  for(let day=1; day<=daysInMonth; day++){
    const d=new Date(y,m,day);
    const isFuture = d > now;
    const ds = todayStr(d);
    const v = (DB.jerkMeter.history||{})[ds];
    const cell=document.createElement('div');
    cell.className='cal-cell'+(isFuture?' future':'')+(ds===todayStr(now)?' today':'');
    let dot='';
    if(!isFuture) dot = '<div class="cal-dot'+(v==='success'?' green':'')+'"></div>';
    cell.innerHTML='<div class="cal-num">'+day+'</div>'+dot;
    grid.appendChild(cell);
  }
  histCard.appendChild(grid);
  el.appendChild(histCard);

  const resetBtn=document.createElement('button'); resetBtn.className='btn danger section';
  resetBtn.textContent='Reset Streak';
  resetBtn.onclick=()=>{
    if(confirm('Log a reset for today? This will break your current streak.')){
      if(!DB.jerkMeter.history) DB.jerkMeter.history={};
      DB.jerkMeter.history[dateStr]='fail';
      persistDebounced(); render();
    }
  };
  el.appendChild(resetBtn);
}

function computeGoalProgress(g){
  if(g.milestones && g.milestones.length){
    const done = g.milestones.filter(m=>m.done).length;

  }
  return g.progressManual||0;
}

/* ================= MONTHLY REVIEW ================= */
function renderReview(el){
  const title=document.createElement('div'); title.className='page-title';
  title.innerHTML='<span>Monthly Review</span>';
  el.appendChild(title);

  const now=new Date();
  const target = new Date(now.getFullYear(), now.getMonth()+REVIEW_OFFSET, 1);
  const mk = monthKey(target);
  const nav=document.createElement('div'); nav.className='card section';
  nav.innerHTML='<div class="cal-nav" style="margin-bottom:0;">'+
    '<div class="icon-btn" id="rv-prev">'+ICON('chevL',18)+'</div>'+
    '<div class="cal-month-label">'+MONTHS[target.getMonth()]+' '+target.getFullYear()+'</div>'+
    '<div class="icon-btn" id="rv-next">'+ICON('chevR',18)+'</div></div>';
  el.appendChild(nav);
  nav.querySelector('#rv-prev').onclick=()=>{ REVIEW_OFFSET--; render(); };
  nav.querySelector('#rv-next').onclick=()=>{ if(REVIEW_OFFSET<0){ REVIEW_OFFSET++; render(); } };

  const daysInMonth = new Date(target.getFullYear(),target.getMonth()+1,0).getDate();
  const isCurrentMonth = mk===monthKey(now);
  const lastDay = isCurrentMonth? now.getDate() : daysInMonth;
  let pctSum=0, gymHit=0, gymApplicable=0, calHit=0, proHit=0, waterHit=0, dayCount=0;
  let firstWeight=null, lastWeight=null;
  const wh = DB.fitness.weightHistory.slice().sort((a,b)=>a.date.localeCompare(b.date));
  let bestPct=-1, bestDate=null;
  for(let day=1; day<=lastDay; day++){
    const d = new Date(target.getFullYear(),target.getMonth(),day);
    const ds = todayStr(d);
    const pct = dayCompletionPct(d);
    pctSum += pct; dayCount++;
    if(pct>bestPct){ bestPct=pct; bestDate=ds; }
    const dow=d.getDay();
    if(DB.gymSchedule[dow]!=='Rest'){ gymApplicable++; if(isTaskDone(ds,'gym')) gymHit++; }
    const nlog = DB.nutrition.log[ds];
    if(nlog){ if(nlog.calories>=DB.nutrition.calorieGoal*0.9) calHit++; if(nlog.protein>=DB.nutrition.proteinGoal) proHit++; }
    if((DB.completions[ds]&&DB.completions[ds].water||0)>=DB.waterGoal) waterHit++;
    wh.forEach(w=>{ if(w.date===ds){ if(!firstWeight) firstWeight=w.weight; lastWeight=w.weight; } });
  }
  const avgScore = dayCount? Math.round(pctSum/dayCount) : 0;
  const grade = gradeFor(avgScore);
  const gymPct = gymApplicable? Math.round(gymHit/gymApplicable*100) : 0;
  const calPct = dayCount? Math.round(calHit/dayCount*100) : 0;
  const proPct = dayCount? Math.round(proHit/dayCount*100) : 0;
  const waterPct = dayCount? Math.round(waterHit/dayCount*100) : 0;
  const weightChange = (firstWeight!=null && lastWeight!=null)? (lastWeight-firstWeight).toFixed(1) : null;

  const moneyThisMonth = DB.money.entries.filter(e=>e.date && e.date.slice(0,7)===mk);
  const savedThisMonth = moneyThisMonth.filter(e=>e.type==='saving').reduce((s,e)=>s+e.amount,0);
  const revenueThisMonth = DB.shopify.entries.filter(e=>e.date && e.date.slice(0,7)===mk && e.type==='revenue').reduce((s,e)=>s+e.amount,0);
  const costThisMonth = DB.shopify.entries.filter(e=>e.date && e.date.slice(0,7)===mk && e.type==='cost').reduce((s,e)=>s+e.amount,0);
  const profitThisMonth = revenueThisMonth-costThisMonth;
  const hoursWorked = DB.shopify.workSessions.filter(w=>w.date && w.date.slice(0,7)===mk).reduce((s,w)=>s+w.minutes,0)/60;

  const hero=document.createElement('div'); hero.className='card section review-hero';
  hero.innerHTML = '<div class="eyebrow">Average Life Score</div><div class="review-grade">'+grade+'</div><div class="status-sub">'+avgScore+' / 100</div>';
  el.appendChild(hero);

  const grid=document.createElement('div'); grid.className='card section';
  grid.innerHTML='<div class="review-grid">'+
    '<div class="stat-box"><div class="sv">'+gymPct+'%</div><div class="sl">Gym</div></div>'+
    '<div class="stat-box"><div class="sv">'+calPct+'%</div><div class="sl">Calories</div></div>'+
    '<div class="stat-box"><div class="sv">'+proPct+'%</div><div class="sl">Protein</div></div>'+
    '<div class="stat-box"><div class="sv">'+waterPct+'%</div><div class="sl">Water</div></div>'+
    '<div class="stat-box"><div class="sv">'+(weightChange!=null? (weightChange>0?'+':'')+weightChange+'kg' : '–')+'</div><div class="sl">Weight Change</div></div>'+
    '<div class="stat-box"><div class="sv">'+fmtMoney(savedThisMonth)+'</div><div class="sl">Money Saved</div></div>'+
    '<div class="stat-box"><div class="sv">'+fmtMoney(revenueThisMonth)+'</div><div class="sl">Revenue</div></div>'+
    '<div class="stat-box"><div class="sv">'+fmtMoney(profitThisMonth)+'</div><div class="sl">Profit</div></div>'+
  '</div><div class="log-row" style="margin-top:4px;"><div class="lr-main">Hours Worked</div><div class="lr-val">'+hoursWorked.toFixed(1)+'h</div></div>'+
  (bestDate?'<div class="log-row"><div class="lr-main">Best Day</div><div class="lr-val">'+bestDate+' ('+bestPct+'%)</div></div>':'');
  el.appendChild(grid);

  if(!DB.monthlyReviews[mk]) DB.monthlyReviews[mk] = {achievement:'', improve:''};
  const rv = DB.monthlyReviews[mk];
  const notesCard=document.createElement('div'); notesCard.className='card section';
  notesCard.innerHTML = '<div class="eyebrow">Biggest Achievement</div>'+
    '<textarea id="rv-ach" style="width:100%; background:var(--card2); border:1px solid var(--border); color:var(--text); padding:12px; border-radius:12px; font-size:14.5px; min-height:60px; font-family:inherit;" placeholder="What went right this month?">'+escapeHtml(rv.achievement)+'</textarea>'+
    '<div class="eyebrow" style="margin-top:16px;">Needs Improvement</div>'+
    '<textarea id="rv-imp" style="width:100%; background:var(--card2); border:1px solid var(--border); color:var(--text); padding:12px; border-radius:12px; font-size:14.5px; min-height:60px; font-family:inherit;" placeholder="What could be better?">'+escapeHtml(rv.improve)+'</textarea>';
  el.appendChild(notesCard);
  notesCard.querySelector('#rv-ach').oninput=(e)=>{ rv.achievement=e.target.value; persistDebounced(); };
  notesCard.querySelector('#rv-imp').oninput=(e)=>{ rv.improve=e.target.value; persistDebounced(); };
}

function exportData(){
  const blob = new Blob([JSON.stringify(DB,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='lifeos-backup-'+todayStr()+'.json';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
}

/* ================= MODAL SYSTEM ================= */
function openModal(type,payload){ MODAL={type,payload}; render(); }
function closeModal(){ MODAL=null; render(); }
window.LifeOS = { closeModal };

function renderModal(r){
  if(!MODAL) return;
  const backdrop=document.createElement('div'); backdrop.className='modal-backdrop';
  backdrop.onclick=(e)=>{ if(e.target===backdrop) closeModal(); };
  const sheet=document.createElement('div'); sheet.className='modal-sheet';
  sheet.onclick=(e)=>e.stopPropagation();
  const handle=document.createElement('div'); handle.className='modal-handle';
  sheet.appendChild(handle);
  const closeX=document.createElement('div'); closeX.className='close-x'; closeX.innerHTML=ICON('x',18);
  closeX.onclick=closeModal;
  sheet.appendChild(closeX);
  const body=document.createElement('div');
  sheet.appendChild(body);
  backdrop.appendChild(sheet);
  r.appendChild(backdrop);

  const t = MODAL.type, p = MODAL.payload||{};
  if(t==='more') renderMoreSheet(body);
  else if(t==='edit-routine') renderRoutineForm(body);
  else if(t==='edit-gym') renderGymForm(body);
  else if(t==='edit-extra') renderExtraForm(body, p.extraId);
  else if(t==='add-reminder') renderReminderForm(body, p.reminderId);
  else if(t==='add-goal') renderGoalForm(body, p.goalId);
  else if(t==='goal-detail') renderGoalDetail(body, p.goalId);
  else if(t==='edit-recipe') renderRecipeForm(body, p.recipeId);
  else if(t==='manage-links') renderLinksManager(body);
  else if(t==='manage-quotes') renderQuotesManager(body);
  else if(t==='day-summary') renderDaySummary(body, p.dateStr);
  else if(t==='add-gymlog') renderGymLogForm(body);
  else if(t==='log-weight') renderWeightForm(body);
  else if(t==='log-measure') renderMeasureForm(body);
  else if(t==='add-photo') renderPhotoForm(body);
  else if(t==='log-daily') renderDailyLogForm(body);
  else if(t==='edit-nutrition-goals') renderNutritionGoalsForm(body);
  else if(t==='log-nutrition') renderNutritionLogForm(body);
  else if(t==='edit-meal') renderMealForm(body, p.mealId);
  else if(t==='add-money') renderMoneyForm(body);
  else if(t==='add-shopify-entry') renderShopifyEntryForm(body);
  else if(t==='log-worksession') renderWorkSessionForm(body);
  else if(t==='edit-product') renderProductForm(body, p.productId);
  else if(t==='add-schooltask') renderSchoolTaskForm(body);
  else if(t==='add-class') renderClassForm(body, p.day);
  else if(t==='add-trip') renderTripForm(body, p.tripId);
  else if(t==='add-dreamimage') renderDreamImageForm(body);
  else if(t==='add-milestone') renderMilestoneEventForm(body);
}

function renderGoalDetail(body, goalId){
  const g = DB.goals.find(x=>x.id===goalId);
  if(!g){ body.innerHTML='<div class="modal-title">Goal not found</div>'; return; }
  const progress = computeGoalProgress(g);
  body.innerHTML = '<div class="modal-title">'+escapeHtml(g.title)+'</div>'+
    (g.why?'<div class="goal-why" style="margin-bottom:14px;">"'+escapeHtml(g.why)+'"</div>':'')+
    '<div class="progress-bar"><div class="progress-fill" style="width:'+progress+'%"></div></div>'+
    '<div class="goal-meta-row" style="margin-bottom:16px;"><span>'+progress+'% complete</span><span>'+capitalize(g.type)+(g.targetDate?' · due '+g.targetDate:'')+'</span></div>'+
    '<div class="eyebrow">Milestones</div><div id="milestone-list"></div>'+
    '<div style="display:flex; gap:8px; margin-top:8px;"><input type="text" id="ms-new" placeholder="Add a milestone" style="flex:1; background:var(--card2); border:1px solid var(--border); color:var(--text); padding:10px 12px; border-radius:10px; font-size:14px;"><button class="btn small" id="ms-add">Add</button></div>'+
    '<div style="display:flex; gap:10px; margin-top:20px;"><button class="btn secondary" id="g-edit-btn">Edit</button>'+
    (!g.completed?'<button class="btn" id="g-complete-btn">Mark Complete</button>':'')+'</div>';
  function renderMilestones(){
    const wrap=body.querySelector('#milestone-list'); wrap.innerHTML='';
    (g.milestones||[]).forEach(m=>{
      const row=document.createElement('div'); row.className='milestone';
      row.innerHTML='<div class="mini-check '+(m.done?'done':'')+'">'+(m.done?ICON('check',12):'')+'</div><div style="flex:1;'+(m.done?'color:var(--text3);text-decoration:line-through;':'')+'">'+escapeHtml(m.text)+'</div>';
      row.querySelector('.mini-check').onclick=()=>{
        m.done=!m.done; g.lastActivity=new Date().toISOString();
        persistDebounced(); renderMilestones();
        body.querySelector('.progress-fill').style.width = computeGoalProgress(g)+'%';
      };
      wrap.appendChild(row);
    });
  }
  renderMilestones();
  body.querySelector('#ms-add').onclick=()=>{
    const input=body.querySelector('#ms-new'); if(!input.value.trim()) return;
    if(!g.milestones) g.milestones=[];
    g.milestones.push({id:uid(), text:input.value.trim(), done:false});
    input.value=''; g.lastActivity=new Date().toISOString();
    persistDebounced(); renderMilestones();
  };
  body.querySelector('#g-edit-btn').onclick=()=> openModal('add-goal',{goalId:g.id});
  if(!g.completed){
    body.querySelector('#g-complete-btn').onclick=()=>{
      g.completed=true; g.completedDate=todayStr(); checkAutoMilestones(); persistDebounced(); closeModal();
    };
  }
}

function resizeImageFile(file, maxDim, cb){
  const reader = new FileReader();
  reader.onload = (e)=>{
    const img = new Image();
    img.onload = ()=>{
      let w=img.width, h=img.height;
      if(w>h){ if(w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; } }
      else { if(h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; } }
      const canvas=document.createElement('canvas'); canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      cb(canvas.toDataURL('image/jpeg',0.78));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

    '<div class="goal-meta-row" style="margin-bottom:12px;"><span>'+pct+'% complete</span></div>';
  const list=document.createElement('div');
  tasks.forEach(t=>{
    const done = isTaskDone(dateStr,t.key);
    const row=document.createElement('div'); row.className='day-summary-row';
    row.innerHTML = '<div class="check-circle'+(done?' done':'')+'">'+(done?ICON('check',13):'')+'</div><div style="flex:1;">'+escapeHtml(t.name)+'</div>';
    if(!t.auto){
      row.style.cursor='pointer';
      row.onclick=()=>{ toggleTask(dateStr, t.key); openModal('day-summary',{dateStr}); };
    }
    list.appendChild(row);
  });
  body.appendChild(list);
}
