<style>
:root{
  --bg:#0b0b0d;
  --bg-elev:#Ffffff05;
  --card:#1c1c1f;
  --card2:#232326;
  --border:#ffffff12;
  --text:#f5f5f7;
  --text2:#98989d;
  --text3:#6e6e73;
  --accent:#0a84ff;
  --accent-dim:#0a84ff22;
  --success:#30d158;
  --success-dim:#30d15822;
  --warning:#ff9f0a;
  --danger:#ff453a;
  --danger-dim:#ff453a22;
  --radius-l:22px;
  --radius-m:16px;
  --radius-s:10px;
  --sp1:4px; --sp2:8px; --sp3:12px; --sp4:16px; --sp5:24px; --sp6:32px; --sp7:48px;
  --ease: cubic-bezier(.22,1,.36,1);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html, body{ margin:0; padding:0; width:100%; height:100%; }
.lifeos-root{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",system-ui,sans-serif;
  background:radial-gradient(1200px 800px at 50% -10%, #1a1a1e 0%, var(--bg) 55%);
  color:var(--text);
  width:100vw;
  min-height:100vh;
  min-height:100dvh;
  margin:0;
  position:relative;
  overflow-x:hidden;
  letter-spacing:-0.01em;
}
.screen{
  width:100%;
  padding:calc(env(safe-area-inset-top,0px) + 24px) max(20px, env(safe-area-inset-right,0px)) 100px max(20px, env(safe-area-inset-left,0px));
  min-height:100vh;
  min-height:100dvh;
  margin:0;
  animation:fadeIn .45s var(--ease);
}
@keyframes fadeIn{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:translateY(0)}}
h1,h2,h3,p{margin:0;}
.card{
  background:linear-gradient(180deg, var(--card2), var(--card));
  border:1px solid var(--border);
  border-radius:var(--radius-l);
  padding:var(--sp5);
  box-shadow:0 10px 30px -12px #00000080, inset 0 1px 0 #ffffff08;
  transition:transform .25s var(--ease), box-shadow .25s var(--ease);
}
.card:active{transform:scale(0.985);}
.section{margin-bottom:var(--sp5);}
.eyebrow{font-size:13px; color:var(--text2); font-weight:600; letter-spacing:.02em; margin-bottom:var(--sp2); text-transform:uppercase; opacity:.75}
.greeting{font-size:32px; font-weight:700; letter-spacing:-0.02em;}
.subgreeting{font-size:15px; color:var(--text2); margin-top:6px; font-style:italic;}
.btn{
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:14px;
  padding:14px 18px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:transform .15s var(--ease), opacity .15s;
  width:100%;
}
.btn:active{transform:scale(0.96);}
.btn.secondary{background:var(--card2); color:var(--text); border:1px solid var(--border);}
.btn.danger{background:var(--danger-dim); color:var(--danger);}
.btn.small{width:auto; padding:9px 14px; font-size:14px; border-radius:11px;}
.pill{
  display:inline-flex; align-items:center; gap:6px;
  background:var(--card2); border:1px solid var(--border);
  color:var(--text2); font-size:12.5px; font-weight:600;
  padding:6px 11px; border-radius:100px;
}
.pill.active{background:var(--accent-dim); color:var(--accent); border-color:transparent;}

/* progress ring */
.ring-wrap{display:flex; align-items:center; gap:var(--sp5);}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-bg{fill:none; stroke:#ffffff10; stroke-width:9;}
.ring-fg{fill:none; stroke:var(--accent); stroke-width:9; stroke-linecap:round; transition:stroke-dashoffset 1s var(--ease);}
.ring-pct{font-size:26px; font-weight:700;}

/* routine row */
.routine-row{
  display:flex; align-items:center; gap:14px;
  padding:13px 0;
  border-bottom:1px solid var(--border);
}
.routine-row:last-child{border-bottom:none;}
.check-circle{
  width:30px; height:30px; min-width:30px; border-radius:50%;
  border:2px solid var(--text3);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  transition:all .25s var(--ease);
  font-size:15px;
  background:transparent;
}
.check-circle.done{
  background:var(--success); border-color:var(--success);
  transform:scale(1.05);
  animation:pop .3s var(--ease);
}
@keyframes pop{0%{transform:scale(.7)}60%{transform:scale(1.18)}100%{transform:scale(1.05)}}
.routine-info{flex:1; min-width:0;}
.routine-name{font-size:16px; font-weight:600;}
.routine-name.done{color:var(--text3); text-decoration:line-through; text-decoration-color:var(--text3);}
.routine-meta{font-size:13px; color:var(--text2); margin-top:2px;}
.routine-icon{font-size:20px; width:26px; text-align:center;}
.priority-dot{width:6px; height:6px; border-radius:50%; display:inline-block; margin-right:4px;}

/* quick launch */
.quick-launch{display:flex; gap:14px; overflow-x:auto; padding-bottom:4px;}
.quick-launch::-webkit-scrollbar{display:none;}
.ql-item{
  display:flex; flex-direction:column; align-items:center; gap:8px;
  min-width:64px; cursor:pointer;
}
.ql-icon{
  width:56px; height:56px; border-radius:16px;
  background:var(--card2); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:24px;
  transition:transform .15s var(--ease);
}
.ql-item:active .ql-icon{transform:scale(.92);}
.ql-label{font-size:11.5px; color:var(--text2); font-weight:600;}

/* suggestion */
.suggestion{
  display:flex; align-items:center; gap:12px;
  background:var(--accent-dim); border:1px solid #0a84ff33;
  border-radius:var(--radius-m); padding:14px 16px; font-size:14.5px; color:var(--text);
}
.suggestion .dot{font-size:18px;}

/* bottom nav */
.tabbar{
  position:fixed; bottom:0; left:0; right:0; width:100%;
  background:#151517ee; backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;
  padding:10px max(6px, env(safe-area-inset-right,0px)) calc(10px + env(safe-area-inset-bottom,0px)) max(6px, env(safe-area-inset-left,0px));
  z-index:50;
}
.tab{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
  color:var(--text3); cursor:pointer; font-size:10.5px; font-weight:600;
  padding:6px 0; border-radius:12px; transition:color .2s;
}
.tab.active{color:var(--accent);}
.tab .icon{font-size:20px;}

/* week */
.week-day-card{margin-bottom:14px; cursor:pointer;}
.week-day-head{display:flex; justify-content:space-between; align-items:center;}
.week-day-name{font-size:17px; font-weight:700;}
.week-day-date{font-size:12.5px; color:var(--text2); margin-top:2px;}
.week-mini-bar{width:70px; height:6px; border-radius:4px; background:#ffffff12; overflow:hidden;}
.week-mini-fill{height:100%; background:var(--success); transition:width .5s var(--ease);}
.week-day-summary{margin-top:10px; font-size:13px; color:var(--text2); display:flex; gap:8px; flex-wrap:wrap;}
.today-badge{background:var(--accent); color:#fff; font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:100px;}

/* modal */
.modal-backdrop{
  position:fixed; inset:0; background:#000000aa; backdrop-filter:blur(4px);
  z-index:100; display:flex; align-items:flex-end;
  animation:fadeIn .25s var(--ease);
}
.modal-sheet{
  width:100%; margin:0;
  background:#1c1c1f; border-radius:26px 26px 0 0;
  padding:14px max(20px, env(safe-area-inset-right,0px)) calc(34px + env(safe-area-inset-bottom,0px)) max(20px, env(safe-area-inset-left,0px));
  max-height:88vh; overflow-y:auto;
  animation:slideUp .35s var(--ease);
  border:1px solid var(--border); border-bottom:none;
}
@keyframes slideUp{from{transform:translateY(60px); opacity:.4} to{transform:translateY(0); opacity:1}}
.modal-handle{width:36px; height:4px; background:var(--text3); border-radius:4px; margin:0 auto 18px auto; opacity:.5;}
.modal-title{font-size:20px; font-weight:700; margin-bottom:14px;}
.close-x{position:absolute; top:16px; right:18px; color:var(--text2); font-size:22px; cursor:pointer; z-index:5;}

/* form */
.field{margin-bottom:16px;}
.field label{display:block; font-size:13px; color:var(--text2); font-weight:600; margin-bottom:6px;}
.field input[type=text], .field input[type=date], .field input[type=time], .field input[type=number], .field textarea, .field select{
  width:100%; background:var(--card2); border:1px solid var(--border);
  color:var(--text); padding:12px 14px; border-radius:12px; font-size:15px; font-family:inherit;
}
.field textarea{resize:vertical; min-height:80px;}
.day-select{display:flex; gap:6px; flex-wrap:wrap;}
.day-chip{
  width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  background:var(--card2); border:1px solid var(--border); font-size:12.5px; font-weight:700; color:var(--text2);
  cursor:pointer;
}
.day-chip.sel{background:var(--accent); color:#fff; border-color:transparent;}

/* goals */
.goal-type-tabs{display:flex; gap:8px; overflow-x:auto; margin-bottom:16px;}
.goal-card{margin-bottom:14px;}
.goal-title{font-size:17px; font-weight:700;}
.goal-why{font-size:13px; color:var(--text2); margin-top:4px; font-style:italic;}
.progress-bar{height:8px; border-radius:6px; background:#ffffff12; overflow:hidden; margin-top:12px;}
.progress-fill{height:100%; background:var(--accent); transition:width .6s var(--ease);}
.goal-meta-row{display:flex; justify-content:space-between; margin-top:10px; font-size:12.5px; color:var(--text2);}
.milestone{display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); font-size:14.5px;}
.milestone:last-child{border-bottom:none;}
.mini-check{width:20px; height:20px; border-radius:6px; border:2px solid var(--text3); display:flex; align-items:center; justify-content:center; font-size:12px; cursor:pointer;}
.mini-check.done{background:var(--success); border-color:var(--success);}

/* journal */
.journal-editor textarea{
  width:100%; min-height:220px; background:transparent; border:none; color:var(--text);
  font-size:16.5px; line-height:1.6; font-family:inherit; resize:none;
}
.journal-editor textarea:focus{outline:none;}
.journal-context{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px;}
.journal-entry-row{padding:14px 0; border-bottom:1px solid var(--border); cursor:pointer;}
.journal-entry-row:last-child{border-bottom:none;}
.je-date{font-size:13px; color:var(--accent); font-weight:700;}
.je-preview{font-size:14.5px; color:var(--text2); margin-top:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.month-group{font-size:12.5px; color:var(--text3); font-weight:700; text-transform:uppercase; letter-spacing:.04em; margin:18px 0 4px 0;}
.search-input{
  width:100%; background:var(--card2); border:1px solid var(--border); color:var(--text);
  padding:12px 14px; border-radius:14px; font-size:15px; margin-bottom:16px;
}
.saved-tag{font-size:11.5px; color:var(--success); font-weight:600;}

/* calendar */
.cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-top:12px;}
.cal-dow{font-size:11px; color:var(--text3); text-align:center; font-weight:700;}
.cal-cell{
  aspect-ratio:1; border-radius:10px; display:flex; align-items:center; justify-content:center;
  font-size:13px; color:var(--text2); background:#ffffff08; cursor:pointer; position:relative;
}
.cal-cell.complete{background:var(--success-dim); color:var(--success); font-weight:700;}
.cal-cell.partial{background:#ffffff14; color:var(--text);}
.cal-cell.future{opacity:.35; cursor:default;}
.cal-cell.today{border:1.5px solid var(--accent);}
.cal-cell.empty{background:transparent; cursor:default;}

.fab{
  position:fixed;
  bottom:calc(110px + env(safe-area-inset-bottom,0px));
  right:max(20px, env(safe-area-inset-right,0px));
  width:56px; height:56px; border-radius:50%; background:var(--accent);
  color:#fff; font-size:26px; display:flex; align-items:center; justify-content:center;
  box-shadow:0 8px 24px -6px #0a84ff88; cursor:pointer; z-index:40; border:none;
}
.empty-state{text-align:center; padding:40px 10px;}
.empty-state .big-icon{font-size:44px; margin-bottom:14px;}
.empty-state h3{font-size:19px; margin-bottom:8px;}
.empty-state p{color:var(--text2); font-size:14.5px;}
.settings-row{display:flex; justify-content:space-between; align-items:center; padding:14px 0; border-bottom:1px solid var(--border);}
.settings-row:last-child{border-bottom:none;}
.settings-row .label{font-size:15.5px; font-weight:500;}
.toggle{width:46px; height:28px; border-radius:20px; background:var(--card2); border:1px solid var(--border); position:relative; cursor:pointer; transition:background .2s;}
.toggle.on{background:var(--success);}
.toggle::after{content:''; position:absolute; width:22px; height:22px; border-radius:50%; background:#fff; top:2px; left:2px; transition:transform .2s var(--ease);}
.toggle.on::after{transform:translateX(18px);}
.routine-edit-item{display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--border);}
.routine-edit-item:last-child{border-bottom:none;}
.link-btn{color:var(--accent); font-size:14.5px; font-weight:600; cursor:pointer;}
.conflict-box{background:var(--danger-dim); border:1px solid #ff453a33; border-radius:14px; padding:14px; font-size:13.5px; margin-top:12px;}
.conflict-box .opt{color:var(--accent); font-weight:600; margin-top:8px; cursor:pointer;}
::-webkit-scrollbar{width:0px;}
</style>

<div class="lifeos-root" id="lifeos-root"></div>

<script>
(function(){

window.storage = {
  async get(key){
    const value = localStorage.getItem(key);
    return value===null ? null : {value};
  },
  async set(key,value){
    localStorage.setItem(key,value);
    return true;
  }
};


const ICONS = {
  today:'☀️', week:'📅', goals:'🎯', journal:'📓', settings:'⚙️'
};

const QUOTES = [
  "Consistency beats intensity.",
  "Today's routine builds tomorrow's results.",
  "Small actions repeated daily become extraordinary over time.",
  "Discipline is choosing what you want most over what you want now.",
  "You don't have to be perfect, just consistent.",
  "Every completed routine is a vote for who you're becoming.",
  "Progress hides inside repetition.",
  "Calm minds build the best days.",
  "Show up today. That's the whole job.",
  "Slow, steady, and unglamorous is how real progress works."
];

const PRIORITY_COLOR = { critical:'var(--danger)', important:'var(--warning)', optional:'var(--text3)' };
const DOW = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DOW_SHORT = ['S','M','T','W','T','F','S'];

function uid(){ return Math.random().toString(36).slice(2,10)+Date.now().toString(36); }
function todayStr(d){ d = d || new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function dayOfYear(d){ const start = new Date(d.getFullYear(),0,0); return Math.floor((d-start)/86400000); }
function timeToMin(t){ if(!t) return null; const [h,m]=t.split(':').map(Number); return h*60+m; }
function fmtTime(t){ if(!t) return ''; const [h,m]=t.split(':').map(Number); const ampm=h>=12?'PM':'AM'; let h12=h%12; if(h12===0)h12=12; return h12+':'+String(m).padStart(2,'0')+' '+ampm; }
function addDays(d,n){ const nd=new Date(d); nd.setDate(nd.getDate()+n); return nd; }
function startOfWeek(d){ const nd=new Date(d); const day=nd.getDay(); const diff=(day===0?-6:1-day); nd.setDate(nd.getDate()+diff); nd.setHours(0,0,0,0); return nd; }

function defaultDB(){
  const R = (name,icon,days,time,dur,priority,flex)=>({id:uid(),name,icon,days,time,duration:dur,priority,flexible:flex,notify:true});
  return {
    settings:{ userName:'', quickLinks:[
      {id:uid(), name:'Spotify', icon:'🎵', url:'https://open.spotify.com'},
      {id:uid(), name:'Shopify', icon:'🛍️', url:'https://www.shopify.com'},
      {id:uid(), name:'Meta Ads', icon:'📣', url:'https://adsmanager.facebook.com'},
      {id:uid(), name:'Snap Fitness', icon:'💪', url:'https://my.snapfitness.com'},
      {id:uid(), name:'Notes', icon:'🗒️', url:'https://www.icloud.com/notes'}
    ]},
    routines:[
      R('Wake Up','🌅',[0,1,2,3,4,5,6],'06:30',15,'critical',false),
      R('Gym','🏋️',[1,2,3,4,6],'07:00',60,'important',false),
      R('School','🎓',[1,2,3,4,5],'08:30',360,'critical',false),
      R('Ecommerce','💻',[1,3,5],'16:00',90,'important',true),
      R('Rugby','🏉',[2],'16:30',120,'important',false),
      R('Homework','📚',[3],'16:30',60,'important',true),
      R('Meal Prep','🍱',[2,0],'18:00',60,'important',true),
      R('Reading','📖',[4,6],'19:30',30,'optional',true),
      R('Room Reset','🧹',[1],'20:00',20,'optional',true),
      R('Sunday Reset','✨',[0],'17:00',45,'critical',false),
      R('Sleep','🌙',[0,1,2,3,4,5,6],'22:00',0,'critical',true)
    ],
    completions:{}, // date -> {routineId: 'done'|'skipped'}
    events:[], // {id,title,date,start,end,notes}
    goals:[], // {id,title,type,description,why,targetDate,milestones:[{id,text,done}],progressManual,supporting:[routineIds],completed,completedDate}
    journal:{} // date -> {text, updatedAt}
  };
}

let DB = null;
let VIEW = 'today';
let MODAL = null; // {type, payload}
let SAVE_TIMER = null;

async function loadDB(){
  try{
    const res = await window.storage.get('lifeos-data', false);
    if(res && res.value){ DB = JSON.parse(res.value); }
    else { DB = defaultDB(); await persist(); }
  }catch(e){ DB = defaultDB(); await persist(); }
  // migrate missing fields
  if(!DB.settings) DB.settings = defaultDB().settings;
  if(!DB.settings.quickLinks) DB.settings.quickLinks = defaultDB().settings.quickLinks;
  render();
}

function persist(){
  return window.storage.set('lifeos-data', JSON.stringify(DB), false).catch(()=>{});
}
function persistDebounced(){
  clearTimeout(SAVE_TIMER);
  SAVE_TIMER = setTimeout(()=>{ persist(); }, 500);
}

function haptic(){ try{ if(navigator.vibrate) navigator.vibrate(8); }catch(e){} }

function root(){ return document.getElementById('lifeos-root'); }

function render(){
  const r = root();
  r.innerHTML = '';
  const screen = document.createElement('div');
  screen.className='screen';
  screen.id='screen';
  r.appendChild(screen);
  if(VIEW==='today') renderToday(screen);
  else if(VIEW==='week') renderWeek(screen);
  else if(VIEW==='goals') renderGoals(screen);
  else if(VIEW==='journal') renderJournal(screen);
  else if(VIEW==='settings') renderSettings(screen);
  renderTabbar(r);
  renderModal(r);
}

function renderTabbar(r){
  const bar = document.createElement('div');
  bar.className='tabbar';
  [['today','Today'],['week','Week'],['goals','Goals'],['journal','Journal'],['settings','Settings']].forEach(([key,label])=>{
    const t=document.createElement('div');
    t.className='tab'+(VIEW===key?' active':'');
    t.innerHTML=`<div class="icon">${ICONS[key]}</div><div>${label}</div>`;
    t.onclick=()=>{ VIEW=key; render(); };
    bar.appendChild(t);
  });
  r.appendChild(bar);
}

// ---------- helpers for routine/day logic ----------
function routinesForDate(dateObj){
  const dow = dateObj.getDay();
  return DB.routines.filter(r=>r.days.includes(dow));
}
function completionsFor(dateStr){
  return DB.completions[dateStr] || {};
}
function setCompletion(dateStr, routineId, status){
  if(!DB.completions[dateStr]) DB.completions[dateStr]={};
  if(status===null) delete DB.completions[dateStr][routineId];
  else DB.completions[dateStr][routineId]=status;
  persistDebounced();
}
function eventsForDate(dateStr){
  return DB.events.filter(e=>e.date===dateStr).sort((a,b)=>(a.start||'').localeCompare(b.start||''));
}
function dayStats(dateObj){
  const dateStr = todayStr(dateObj);
  const routines = routinesForDate(dateObj);
  const comp = completionsFor(dateStr);
  const relevant = routines.filter(r=> comp[r.id]!=='skipped');
  const done = relevant.filter(r=>comp[r.id]==='done').length;
  const total = relevant.length;
  return { done, total, pct: total?Math.round(done/total*100):0 };
}
function weekStats(refDate){
  const start = startOfWeek(refDate);
  let done=0, total=0;
  for(let i=0;i<7;i++){
    const d = addDays(start,i);
    if(d> new Date()) continue; // only count up to today
    const s = dayStats(d);
    done+=s.done; total+=s.total;
  }
  return { done, total, pct: total?Math.round(done/total*100):0 };
}

// ---------- TODAY VIEW ----------
function renderToday(el){
  const now = new Date();
  const hr = now.getHours();
  const greeting = hr<12?'Good morning.':hr<18?'Good afternoon.':'Good evening.';
  const quote = QUOTES[dayOfYear(now)%QUOTES.length];
  const dateStr = todayStr(now);
  const wstats = weekStats(now);
  const routines = routinesForDate(now).slice().sort((a,b)=>{
    if(!a.time) return 1; if(!b.time) return -1; return a.time.localeCompare(b.time);
  });
  const events = eventsForDate(dateStr);
  const comp = completionsFor(dateStr);
  const allDone = routines.length>0 && routines.every(r=>comp[r.id]==='done'||comp[r.id]==='skipped');

  el.innerHTML += `
    <div class="section">
      <div class="greeting">${greeting}</div>
      <div class="subgreeting">"${quote}"</div>
    </div>`;

  // weekly progress ring
  const R=42, C=2*Math.PI*R;
  const off = C - (wstats.pct/100)*C;
  const ring = document.createElement('div');
  ring.className='card section';
  ring.style.cursor='pointer';
  ring.innerHTML=`

          </div>
        </div>`;
      });

      const status = comp[r.id];
      const isDone = status==='done';
      rowsHtml += `<div class="routine-row">
        <div class="check-circle ${isDone?'done':''}" data-routine="${r.id}" onclick="LifeOS.toggleRoutine('${r.id}','${dateStr}')">${isDone?'✓':''}</div>
        <div class="routine-icon">${r.icon||''}</div>
        <div class="routine-info">
          <div class="routine-name ${isDone?'done':''}">${escapeHtml(r.name)}</div>
          <div class="routine-meta"><span class="priority-dot" style="background:${PRIORITY_COLOR[r.priority]}"></span>${r.time?fmtTime(r.time):'Anytime'}</div>
        </div>
      </div>`;
    });
    card.innerHTML = rowsHtml;
  }
  el.appendChild(card);

  // smart suggestion
  const suggestion = getSuggestion(now, dateStr, routines, comp);
  if(suggestion){
    const s = document.createElement('div');
    s.className='suggestion section';

  });

function getSuggestion(now, dateStr, routines, comp){
  const hr = now.getHours();
  const dow = now.getDay();
  if(dow===0){
    const sundayReset = routines.find(r=>r.name==='Sunday Reset');
    if(sundayReset && comp[sundayReset.id]!=='done'){
      return "Don't forget your Sunday Reset before the week begins.";
    }
  }
  const mealPrep = routines.find(r=>r.name==='Meal Prep');
  if(mealPrep && comp[mealPrep.id]!=='done' && hr>=15 && hr<20){
    return "You normally meal prep today.";
  }
  if(hr>=19 && !(DB.journal[dateStr] && DB.journal[dateStr].text && DB.journal[dateStr].text.trim())){
    return "You haven't written today's journal yet.";
  }
  const activeGoals = DB.goals.filter(g=>!g.completed);
  const stale = activeGoals.find(g=>{
    if(!g.lastActivity) return false;
    const days = (now - new Date(g.lastActivity))/86400000;
    return days>14;
  });
  if(stale) return `Would you like to review "${stale.title}"? It hasn't seen progress in a while.`;
  return null;
}

let GOAL_FILTER = 'all';
function renderGoals(el){
  el.innerHTML += `<div class="section"><h2 style="font-size:26px;font-weight:700;">Goals</h2><div class="subgreeting" style="font-style:normal;">How today builds the life you want.</div></div>`;
  const tabs = document.createElement('div');

  [['all','All'],['lifetime','Lifetime'],['annual','Annual'],['monthly','Monthly'],['weekly','Weekly'],['archive','Archive']].forEach(([key,label])=>{
    const p=document.createElement('div');
    p.className='pill'+(GOAL_FILTER===key?' active':'');
    p.innerText=label;
    p.onclick=()=>{ GOAL_FILTER=key; render(); };
    tabs.appendChild(p);
  });
  el.appendChild(tabs);

  let list;
  if(GOAL_FILTER==='archive') list = DB.goals.filter(g=>g.completed);
  else if(GOAL_FILTER==='all') list = DB.goals.filter(g=>!g.completed);
  else list = DB.goals.filter(g=>!g.completed && g.type===GOAL_FILTER);

  if(!list.length){
    el.innerHTML += `<div class="card empty-state">
      <div class="big-icon">🎯</div>
      <h3>${GOAL_FILTER==='archive'?'No goals completed yet':'No goals here yet'}</h3>
      <p>${GOAL_FILTER==='archive'?'Completed goals will appear here.':'Add a goal to give today direction.'}</p>
    </div>`;
  }

  list.sort((a,b)=> (b.lastActivity||'').localeCompare(a.lastActivity||''));
  list.forEach(g=>{
    const progress = computeGoalProgress(g);
    const card = document.createElement('div');
    card.className='card goal-card';
    card.innerHTML = `
      <div class="goal-title">${escapeHtml(g.title)}</div>
      ${g.why?`<div class="goal-why">"${escapeHtml(g.why)}"</div>`:''}
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      <div class="goal-meta-row">
        <span>${progress}% complete</span>
        <span>${capitalize(g.type)}${g.targetDate?' · due '+g.targetDate:''}</span>
      </div>`;
    card.onclick = ()=> openModal('goal-detail',{goalId:g.id});
    el.appendChild(card);
  });

  const fab = document.createElement('button');
  fab.className='fab';
  fab.innerText='+';
  fab.onclick=()=>openModal('add-goal',{});
  el.appendChild(fab);
}

function computeGoalProgress(g){
  if(g.completed) return 100;
  if(g.milestones && g.milestones.length){
    const done = g.milestones.filter(m=>m.done).length;
    return Math.round(done/g.milestones.length*100);
  }
  return g.progressManual||0;
}
function capitalize(s){ return s? s[0].toUpperCase()+s.slice(1):''; }

// ---------- MODALS ----------
function openModal(type, payload){ MODAL = {type,payload}; render(); }
function closeModal(){ MODAL=null; render(); }

function renderModal(r){
  if(!MODAL) return;
  const backdrop = document.createElement('div');
  backdrop.className='modal-backdrop';
  backdrop.onclick=(e)=>{ if(e.target===backdrop) closeModal(); };
  const sheet = document.createElement('div');
  sheet.className='modal-sheet';
  sheet.style.position='relative';
  sheet.innerHTML = `<div class="close-x" onclick="LifeOS.closeModal()">✕</div><div class="modal-handle"></div>`;
  const body = document.createElement('div');
  sheet.appendChild(body);
  backdrop.appendChild(sheet);
  r.appendChild(backdrop);

  const {type,payload} = MODAL;
  if(type==='calendar') renderCalendarModal(body);
  else if(type==='day-detail') renderDayDetailModal(body,payload.dateStr);
  else if(type==='add-event') renderEventForm(body,payload.dateStr,null);
  else if(type==='edit-event') renderEventForm(body,null,payload.eventId);
  else if(type==='add-goal') renderGoalForm(body,payload&&payload.goalId?payload.goalId:null);
  else if(type==='goal-detail') renderGoalDetail(body,payload.goalId);
  else if(type==='edit-routine') renderRoutineForm(body,payload.routineId);
  else if(type==='edit-link') renderLinkForm(body,payload.linkId);
  else if(type==='view-entry') renderViewEntry(body,payload.dateStr);
}

function renderCalendarModal(body){
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(),1);
  const startDow = monthStart.getDay();
  const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1,0).getDate();
  body.innerHTML = `<div class="modal-title">${monthStart.toLocaleDateString(undefined,{month:'long',year:'numeric'})}</div>`;
  const grid = document.createElement('div');
  grid.className='cal-grid';
  DOW_SHORT.forEach(d=>{ const c=document.createElement('div'); c.className='cal-dow'; c.innerText=d; grid.appendChild(c); });
  for(let i=0;i<startDow;i++){ const c=document.createElement('div'); c.className='cal-cell empty'; grid.appendChild(c); }
  const todayS = todayStr();
  for(let day=1; day<=daysInMonth; day++){
    const d = new Date(now.getFullYear(), now.getMonth(), day);
    const dStr = todayStr(d);
    const isFuture = d > new Date(new Date().setHours(23,59,59,999));
    const stats = dayStats(d);
    let cls='cal-cell';
    if(isFuture) cls+=' future';
    else if(stats.total>0 && stats.done===stats.total) cls+=' complete';
    else if(stats.done>0) cls+=' partial';
    if(dStr===todayS) cls+=' today';
    const cell=document.createElement('div');
    cell.className=cls;
    cell.innerText=day;
    if(!isFuture) cell.onclick=()=>openModal('day-detail',{dateStr:dStr});
    grid.appendChild(cell);
  }
  body.appendChild(grid);
}

function renderEventForm(body, dateStr, eventId){
  const existing = eventId? DB.events.find(e=>e.id===eventId): null;
  dateStr = existing? existing.date: dateStr;
  body.innerHTML = `<div class="modal-title">${existing?'Edit Event':'Add Event'}</div>
    <div class="field"><label>Title</label><input type="text" id="ev-title" value="${existing?escapeHtml(existing.title):''}" placeholder="Family Lunch"></div>
    <div class="field"><label>Date</label><input type="date" id="ev-date" value="${dateStr}"></div>
    <div class="field"><label>Start time</label><input type="time" id="ev-start" value="${existing?existing.start||'':''}"></div>
    <div class="field"><label>End time</label><input type="time" id="ev-end" value="${existing?existing.end||'':''}"></div>
    <div id="conflict-area"></div>
    <button class="btn" id="ev-save">Save Event</button>
    ${existing?'<button class="btn danger" id="ev-delete" style="margin-top:10px;">Delete Event</button>':''}
  `;
  function checkConflicts(){
    const dv = body.querySelector('#ev-date').value;
    const s = timeToMin(body.querySelector('#ev-start').value);
    const en = timeToMin(body.querySelector('#ev-end').value);
    const area = body.querySelector('#conflict-area');
    area.innerHTML='';
    if(!dv || s==null || en==null) return;
    const d = new Date(dv+'T00:00:00');
    const routines = routinesForDate(d).filter(r=>r.time && r.flexible);
    const conflicts = routines.filter(r=>{
      const rs = timeToMin(r.time); const re = rs + (r.duration||30);
      return rs < en && s < re;
    });
    if(conflicts.length){
      const box=document.createElement('div');
      box.className='conflict-box';
      box.innerHTML = conflicts.map(r=>`<div>⚠️ This overlaps with <b>${escapeHtml(r.name)}</b>.<div class="opt" data-r="${r.id}" data-d="${dv}">Skip ${escapeHtml(r.name)} on this day</div></div>`).join('');
      box.querySelectorAll('.opt').forEach(o=>{
        o.onclick=()=>{ setCompletion(o.dataset.d, o.dataset.r, 'skipped'); o.innerText='Skipped ✓'; };
      });
      area.appendChild(box);
    }
  }
  ['ev-date','ev-start','ev-end'].forEach(id=> body.querySelector('#'+id).addEventListener('input',checkConflicts));
  checkConflicts();

  body.querySelector('#ev-save').onclick=()=>{
    const title = body.querySelector('#ev-title').value.trim();
    if(!title){ alert('Please enter a title.'); return; }
    const data = {
      title,
      date: body.querySelector('#ev-date').value,
      start: body.querySelector('#ev-start').value,
      end: body.querySelector('#ev-end').value,
    };
    if(existing){ Object.assign(existing, data); }
    else { DB.events.push({id:uid(), ...data}); }
    persistDebounced();
    closeModal();
  };
  if(existing){

function renderGoalDetail(body, goalId){
  const g = DB.goals.find(x=>x.id===goalId);
  if(!g){ body.innerHTML='<p>Goal not found.</p>'; return; }
  const progress = computeGoalProgress(g);
  const supportingRoutines = DB.routines.filter(r=> (g.supporting||[]).includes(r.id));
  body.innerHTML = `<div class="modal-title">${escapeHtml(g.title)}</div>
    ${g.why?`<div class="goal-why" style="margin-bottom:14px;">"${escapeHtml(g.why)}"</div>`:''}
    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    <div class="goal-meta-row" style="margin-bottom:16px;"><span>${progress}% complete</span><span>${capitalize(g.type)}${g.targetDate?' · due '+g.targetDate:''}</span></div>
    <div class="eyebrow">Milestones</div>
    <div id="milestone-list"></div>
    <div style="display:flex; gap:8px; margin-top:8px;">
      <input type="text" id="ms-new" placeholder="Add a milestone" style="flex:1; background:var(--card2); border:1px solid var(--border); color:var(--text); padding:10px 12px; border-radius:10px; font-size:14px;">
      <button class="btn small" id="ms-add">Add</button>
    </div>
    ${supportingRoutines.length?`<div class="eyebrow" style="margin-top:18px;">Supporting Routines</div><div style="display:flex; flex-wrap:wrap; gap:8px;">${supportingRoutines.map(r=>`<span class="pill">${r.icon} ${escapeHtml(r.name)}</span>`).join('')}</div>`:''}
    <div style="display:flex; gap:10px; margin-top:20px;">
      <button class="btn secondary" id="g-edit-btn">Edit</button>
      ${!g.completed?'<button class="btn" id="g-complete-btn">Mark Complete</button>':''}
    </div>
  `;
  function renderMilestones(){
    const wrap = body.querySelector('#milestone-list');
    wrap.innerHTML='';
    (g.milestones||[]).forEach(m=>{
      const row=document.createElement('div');
      row.className='milestone';
      row.innerHTML=`<div class="mini-check ${m.done?'done':''}">${m.done?'✓':''}</div><div style="flex:1;${m.done?'color:var(--text3);text-decoration:line-through;':''}">${escapeHtml(m.text)}</div>`;
      row.querySelector('.mini-check').onclick=()=>{
        m.done=!m.done; g.lastActivity=new Date().toISOString();
        persistDebounced(); renderMilestones();
        body.querySelector('.progress-fill').style.width = computeGoalProgress(g)+'%';
      };
      wrap.appendChild(row);
    });
  }
  renderMilestones();
  body.querySelector('#ms-add').onclick=()=>{
    const input = body.querySelector('#ms-new');
    if(!input.value.trim()) return;
    if(!g.milestones) g.milestones=[];
    g.milestones.push({id:uid(), text:input.value.trim(), done:false});
    input.value='';
    g.lastActivity=new Date().toISOString();
    persistDebounced(); renderMilestones();
  };
  body.querySelector('#g-edit-btn').onclick=()=>openModal('add-goal',{goalId:g.id});
  if(!g.completed){
    body.querySelector('#g-complete-btn').onclick=()=>{
      g.completed=true; g.completedDate=todayStr();
      persistDebounced();
      closeModal();
    };
  }
}

function renderViewEntry(body, dateStr){
  const entry = DB.journal[dateStr];
  const d = new Date(dateStr+'T00:00:00');
  body.innerHTML = `<div class="modal-title">${d.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</div>
    <div style="font-size:15.5px; line-height:1.6; white-space:pre-wrap; color:var(--text);">${escapeHtml(entry?entry.text:'')}</div>`;
}

function escapeHtml(s){
  if(s==null) return '';
  return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function toggleRoutine(routineId, dateStr){
  const comp = completionsFor(dateStr);
  const cur = comp[routineId];
  setCompletion(dateStr, routineId, cur==='done'? null : 'done');
  haptic();
  // update linked goal activity
  DB.goals.forEach(g=>{
    if((g.supporting||[]).includes(routineId)){ g.lastActivity = new Date().toISOString(); }
  });
  render();
}

window.LifeOS = { toggleRoutine, closeModal };

loadDB();

})();
</script>
